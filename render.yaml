services:
  - type: web
    name: find-your-floor
    env: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WOO_BASE_URL
        value: https://lux-floor.de
      - key: ASSISTANT_MODEL
        value: claude-sonnet-4-6
      - key: DAILY_SPEND_CEILING_EUR
        value: "15"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WOO_CONSUMER_KEY
        sync: false
      - key: WOO_CONSUMER_SECRET
        sync: false
      - key: BITRIX_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_HOT_THREAD_ID
        sync: false
